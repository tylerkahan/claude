<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelby's Cookbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #fef8f2;
      --cream2:   #fdf0e8;
      --pink-50:  #fdf2f8;
      --pink-100: #fce7f3;
      --pink-200: #fbcfe8;
      --pink-300: #f9a8d4;
      --pink-400: #f472b6;
      --pink-500: #ec4899;
      --pink-600: #db2777;
      --pink-700: #be185d;
      --rose:     #9d174d;
      --text:     #4a1628;
      --muted:    #a87090;
      --border:   #f5d0e8;
    }

    /* ── Base ── */
    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle, rgba(244,114,182,.13) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(150deg, var(--rose) 0%, var(--pink-600) 45%, var(--pink-500) 100%);
      color: white;
      padding: 32px 40px 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      border-radius: 0 0 48px 48px;
      box-shadow: 0 8px 40px rgba(157,23,77,.35);
      position: relative;
      overflow: hidden;
    }

    /* decorative circles in header bg */
    header::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      top: -100px; right: -60px;
      pointer-events: none;
    }
    header::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      bottom: -60px; left: 60px;
      pointer-events: none;
    }

    .header-brand { position: relative; z-index: 1; }
    .header-site-name {
      font-family: 'Dancing Script', cursive;
      font-size: 44px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .5px;
      text-shadow: 0 2px 12px rgba(0,0,0,.18);
    }
    .header-tagline {
      font-size: 12px;
      font-weight: 400;
      opacity: .75;
      margin-top: 5px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header-sub {
      font-size: 13px;
      opacity: .7;
      margin-top: 4px;
      font-weight: 300;
    }

    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; position: relative; z-index: 1; }

    /* ── Buttons ── */
    button {
      cursor: pointer; border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 10px 20px;
      transition: all .2s ease;
      letter-spacing: .2px;
    }
    .btn-white {
      background: white;
      color: var(--pink-700);
      box-shadow: 0 2px 12px rgba(0,0,0,.14);
    }
    .btn-white:hover { background: var(--pink-50); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.18); }

    .btn-outline {
      background: rgba(255,255,255,.15);
      color: white;
      border: 1.5px solid rgba(255,255,255,.4);
      backdrop-filter: blur(4px);
    }
    .btn-outline:hover { background: rgba(255,255,255,.25); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--pink-50); color: var(--pink-600); border-color: var(--pink-300); }

    .btn-pink { background: var(--pink-500); color: white; box-shadow: 0 2px 12px rgba(236,72,153,.3); }
    .btn-pink:hover { background: var(--pink-600); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(236,72,153,.4); }

    .btn-danger { background: transparent; color: #e11d48; border: 1.5px solid #fecdd3; }
    .btn-danger:hover { background: #fff1f2; }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    /* ── Main ── */
    main { max-width: 1160px; margin: 0 auto; padding: 36px 24px 100px; }

    /* ── Search bar ── */
    .search-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .search-wrap input {
      width: 100%;
      padding: 13px 18px 13px 46px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      background: white;
      color: var(--text);
      box-shadow: 0 2px 12px rgba(190,24,93,.06);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input::placeholder { color: var(--muted); opacity: .7; }
    .search-wrap input:focus { outline: none; border-color: var(--pink-400); box-shadow: 0 0 0 4px rgba(244,114,182,.15); }

    .sort-select {
      padding: 13px 20px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 600;
      background: white; color: var(--text);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(190,24,93,.06);
    }
    .sort-select:focus { outline: none; border-color: var(--pink-400); }

    /* ── Category pill row ── */
    .cat-row {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 4px;
      margin-bottom: 10px;
      scrollbar-width: none;
    }
    .cat-row::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: white;
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .cat-pill:hover { border-color: var(--pink-300); color: var(--pink-600); background: var(--pink-50); }
    .cat-pill.active { background: var(--pink-500); color: white; border-color: var(--pink-500); }
    .cat-pill.fav-pill.active { background: #e11d48; border-color: #e11d48; }

    /* ── Tag bar ── */
    .tag-bar { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }
    .tag-chip {
      display: inline-flex; align-items: center;
      padding: 4px 12px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 12px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all .15s;
    }
    .tag-chip:hover, .tag-chip.active { background: var(--pink-500); color: white; border-color: var(--pink-500); }

    /* ── Controls row ── */
    .controls-row { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .count-label { font-size: 13px; color: var(--muted); font-weight: 500; font-style: italic; }

    /* ── Recipe grid ── */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }

    /* ── Recipe card ── */
    .recipe-card {
      background: white;
      border-radius: 26px;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 4px 20px rgba(190,24,93,.07);
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s;
      display: flex; flex-direction: column;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .recipe-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(190,24,93,.16);
      border-color: var(--pink-300);
    }
    .recipe-card.is-fav { border-color: #fda4af; }

    /* card image / placeholder */
    .card-photo { width: 100%; height: 170px; object-fit: cover; display: block; }
    .card-placeholder {
      height: 170px;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      position: relative;
      overflow: hidden;
    }
    .card-placeholder.ph-breakfast { background: linear-gradient(135deg,#fef9c3,#fde68a); }
    .card-placeholder.ph-lunch     { background: linear-gradient(135deg,#dcfce7,#bbf7d0); }
    .card-placeholder.ph-dinner    { background: linear-gradient(135deg,#ede9fe,#ddd6fe); }
    .card-placeholder.ph-dessert   { background: linear-gradient(135deg,#fce7f3,#fbcfe8); }
    .card-placeholder.ph-snack     { background: linear-gradient(135deg,#fff7ed,#fed7aa); }
    .card-placeholder.ph-drink     { background: linear-gradient(135deg,#e0f2fe,#bae6fd); }
    .card-placeholder.ph-other,
    .card-placeholder.ph-default   { background: linear-gradient(135deg,#fdf2f8,#fbcfe8); }

    .card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; gap: 0; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge-cat {
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--pink-700); background: var(--pink-100);
      border-radius: 50px; padding: 3px 10px;
    }
    .badge-diff { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 50px; padding: 3px 10px; }
    .diff-easy   { background: #dcfce7; color: #15803d; }
    .diff-medium { background: #fef9c3; color: #a16207; }
    .diff-hard   { background: #ffe4e6; color: #be123c; }

    .fav-btn { background: none; border: none; font-size: 20px; padding: 0; line-height: 1; color: #fca5a5; cursor: pointer; border-radius: 50%; transition: transform .15s; }
    .fav-btn:hover { transform: scale(1.25); }
    .fav-btn.active { color: #e11d48; }

    .recipe-card h3 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 19px;
      line-height: 1.3;
      margin-bottom: 7px;
      color: var(--text);
    }
    .card-description { font-size: 13px; color: var(--muted); line-height: 1.55; flex: 1; }

    .card-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; font-size: 12px; color: var(--muted); font-weight: 600; }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
    .card-tag { font-size: 10px; font-weight: 700; color: var(--pink-600); background: var(--pink-50); border: 1px solid var(--pink-200); border-radius: 50px; padding: 2px 9px; }

    .cook-log-info { font-size: 11px; color: var(--muted); margin-top: 8px; font-weight: 500; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon { font-size: 56px; margin-bottom: 18px; display: block; }
    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 26px;
      color: var(--pink-400);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 15px; color: var(--muted); }

    /* ── Overlay / Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(74,22,40,.4);
      backdrop-filter: blur(8px) saturate(1.2);
      z-index: 100; overflow-y: auto;
      padding: 36px 16px;
    }
    .overlay.open { display: flex; justify-content: center; align-items: flex-start; }

    .modal {
      background: white;
      border-radius: 28px;
      padding: 40px;
      width: 100%; max-width: 640px;
      position: relative;
      box-shadow: 0 30px 80px rgba(190,24,93,.2);
      border: 2px solid var(--border);
      animation: modalPop .2s ease;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-style: italic;
      margin-bottom: 24px;
      color: var(--text);
    }

    .modal .close {
      position: absolute; top: 18px; right: 20px;
      font-size: 18px; cursor: pointer;
      color: var(--muted);
      background: var(--pink-50);
      border: none; border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      padding: 0; transition: all .15s;
    }
    .modal .close:hover { background: var(--pink-100); color: var(--pink-700); }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; background: white; color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); opacity: .6; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none; border-color: var(--pink-400);
      box-shadow: 0 0 0 4px rgba(244,114,182,.13);
    }
    .form-group textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .form-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 26px; padding-top: 20px;
      border-top: 2px solid var(--pink-100);
    }

    /* ── View modal ── */
    .view-modal .vm-photo { width: 100%; max-height: 260px; object-fit: cover; border-radius: 18px; margin-bottom: 20px; }
    .view-modal .vm-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .view-modal .vm-header h2 {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 28px; line-height: 1.3; color: var(--text);
    }
    .vm-fav { font-size: 30px; background: none; border: none; cursor: pointer; padding: 0; color: #fca5a5; border-radius: 50%; transition: transform .15s; }
    .vm-fav:hover { transform: scale(1.2); }
    .vm-fav.active { color: #e11d48; }
    .vm-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .vm-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .vm-meta { display: flex; gap: 18px; font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 18px; flex-wrap: wrap; }
    .vm-description { font-size: 15px; color: #7a4060; line-height: 1.75; margin-bottom: 22px; padding-bottom: 20px; border-bottom: 2px solid var(--pink-100); }

    /* serving scaler */
    .scaler {
      display: flex; align-items: center; gap: 12px;
      background: var(--pink-50); border-radius: 14px;
      padding: 12px 16px; margin-bottom: 20px;
      border: 2px solid var(--pink-100);
    }
    .scaler label { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
    .scaler-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .scaler-btn {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: var(--pink-500); color: white;
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
      transition: background .15s, transform .1s;
    }
    .scaler-btn:hover { background: var(--pink-700); transform: scale(1.1); }
    .scaler-val { font-size: 18px; font-weight: 700; color: var(--pink-600); min-width: 54px; text-align: center; }

    .view-modal h3 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--pink-500); margin-bottom: 12px; }
    .view-modal .ingredients { margin-bottom: 22px; }
    .view-modal .ingredients ul { list-style: none; }
    .view-modal .ingredients li { padding: 8px 0; border-bottom: 1px solid var(--pink-50); font-size: 14.5px; display: flex; align-items: baseline; gap: 10px; }
    .view-modal .ingredients li::before { content: "✿"; color: var(--pink-400); font-size: 11px; flex-shrink: 0; }
    .view-modal .instructions { margin-bottom: 22px; }
    .view-modal .instructions ol { list-style: none; counter-reset: steps; padding: 0; }
    .view-modal .instructions li {
      padding: 9px 0 9px 36px; font-size: 14.5px; line-height: 1.65;
      position: relative; counter-increment: steps;
      border-bottom: 1px solid var(--pink-50);
    }
    .view-modal .instructions li::before {
      content: counter(steps);
      position: absolute; left: 0; top: 11px;
      width: 22px; height: 22px; background: var(--pink-500);
      color: white; border-radius: 50%;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .view-modal .notes { background: var(--cream2); border: 2px solid var(--pink-200); border-radius: 14px; padding: 16px 20px; font-size: 14.5px; line-height: 1.7; color: #7a4060; }

    .cook-log-section { margin-top: 20px; border-top: 2px solid var(--pink-100); padding-top: 18px; }
    .log-entries { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .log-entry { font-size: 11px; background: var(--pink-100); color: var(--pink-700); border-radius: 50px; padding: 3px 11px; font-weight: 600; }

    .view-actions { display: flex; gap: 8px; margin-top: 24px; padding-top: 18px; border-top: 2px solid var(--pink-100); justify-content: flex-end; flex-wrap: wrap; }

    /* ── Unit Converter ── */
    .converter-tabs { display: flex; gap: 6px; margin-bottom: 22px; }
    .conv-tab { padding: 8px 18px; border-radius: 50px; font-size: 13px; font-weight: 700; border: 2px solid var(--border); background: white; color: var(--muted); cursor: pointer; transition: all .15s; }
    .conv-tab.active { background: var(--pink-500); color: white; border-color: var(--pink-500); }
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: end; margin-bottom: 18px; }
    .converter-arrow { font-size: 22px; color: var(--pink-400); text-align: center; padding-bottom: 8px; }
    .converter-result { background: var(--pink-50); border: 2px solid var(--pink-200); border-radius: 14px; padding: 14px; text-align: center; font-size: 22px; font-weight: 700; color: var(--pink-600); min-height: 54px; font-family: 'Playfair Display', serif; }

    /* ── Timer ── */
    #timer-fab {
      position: fixed; bottom: 28px; left: 28px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-500), var(--rose));
      color: white; font-size: 22px; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(157,23,77,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform .15s, box-shadow .15s;
    }
    #timer-fab:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(157,23,77,.5); }
    .timer-badge {
      position: absolute; top: -4px; right: -4px;
      background: #e11d48; color: white;
      border-radius: 50px; font-size: 9px; font-weight: 800;
      padding: 2px 5px; display: none;
      border: 2px solid white;
    }

    #timer-panel {
      position: fixed; bottom: 94px; left: 28px; width: 290px;
      background: white; border-radius: 24px;
      box-shadow: 0 12px 40px rgba(157,23,77,.2);
      border: 2px solid var(--border); z-index: 199;
      overflow: hidden;
      transform: scale(.9) translateY(12px); opacity: 0; pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
      transform-origin: bottom left;
    }
    #timer-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

    .panel-header {
      background: linear-gradient(135deg, var(--rose), var(--pink-500));
      color: white; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-header-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; }
    .panel-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: .75; padding: 0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .panel-close:hover { background: rgba(255,255,255,.2); opacity: 1; }

    .timer-body { padding: 20px; }
    .timer-display {
      font-family: 'Playfair Display', serif;
      font-size: 46px; font-weight: 600;
      text-align: center; color: var(--pink-600);
      margin-bottom: 16px; letter-spacing: 3px;
    }
    .timer-display.done { color: #e11d48; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.45} }

    .timer-set-labels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .timer-set-labels span { font-size: 9px; text-align: center; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
    .timer-set { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 6px 0 14px; }
    .timer-set input { width: 100%; padding: 9px 4px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; text-align: center; color: var(--text); }
    .timer-set input:focus { outline: none; border-color: var(--pink-400); }

    .timer-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .preset-btn { font-size: 11px; padding: 5px 11px; border-radius: 50px; border: 2px solid var(--border); background: white; color: var(--muted); cursor: pointer; font-weight: 700; transition: all .15s; }
    .preset-btn:hover { background: var(--pink-100); color: var(--pink-600); border-color: var(--pink-300); }

    .timer-controls { display: flex; gap: 8px; }
    .timer-controls button { flex: 1; font-size: 13px; padding: 10px 0; }

    /* ── Grocery ── */
    #grocery-fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-500), var(--rose));
      color: white; font-size: 22px; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(157,23,77,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform .15s, box-shadow .15s;
    }
    #grocery-fab:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(157,23,77,.5); }
    .grocery-badge {
      position: absolute; top: -4px; right: -4px;
      background: #e11d48; color: white;
      border-radius: 50px; font-size: 9px; font-weight: 800;
      padding: 2px 5px; display: none; border: 2px solid white;
    }

    #grocery-panel {
      position: fixed; bottom: 94px; right: 28px;
      width: 300px; max-height: 490px;
      background: white; border-radius: 24px;
      box-shadow: 0 12px 40px rgba(157,23,77,.2);
      border: 2px solid var(--border); z-index: 199;
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(.9) translateY(12px); opacity: 0; pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
      transform-origin: bottom right;
    }
    #grocery-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

    .grocery-items { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .grocery-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--pink-50); }
    .grocery-item input[type=checkbox] { accent-color: var(--pink-500); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .grocery-item-text { flex: 1; font-size: 14px; cursor: pointer; transition: color .15s; }
    .grocery-item.done .grocery-item-text { text-decoration: line-through; color: var(--muted); }
    .grocery-item-del { background: none; border: none; color: #fca5a5; font-size: 16px; cursor: pointer; padding: 0; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .grocery-item-del:hover { color: #e11d48; background: #fff1f2; }
    .grocery-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 2px solid var(--pink-100); flex-shrink: 0; }
    .grocery-input-row input { flex: 1; padding: 9px 13px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 13px; }
    .grocery-input-row input:focus { outline: none; border-color: var(--pink-400); }
    .grocery-input-row button { padding: 9px 15px; border-radius: 12px; background: var(--pink-500); color: white; font-size: 16px; font-weight: 700; }
    .grocery-footer { display: flex; gap: 8px; padding: 8px 14px 12px; flex-shrink: 0; }
    .grocery-footer button { flex: 1; font-size: 11px; padding: 7px; }
    .grocery-empty { text-align: center; padding: 36px 16px; color: var(--muted); font-size: 13px; }
    .grocery-empty .gi { font-size: 32px; margin-bottom: 8px; }

    /* ── Pasta canvas ── */
    #pasta-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    header, main, .overlay, #timer-fab, #timer-panel, #grocery-fab, #grocery-panel {
      position: relative;
      z-index: 1;
    }

    /* ── Print ── */
    @media print {
      header, .search-row, .cat-row, .tag-bar, .controls-row,
      #timer-fab, #timer-panel, #grocery-fab, #grocery-panel,
      .view-actions, .scaler, .modal .close, .overlay:not(.open) { display: none !important; }
      .overlay.open { position: static; background: none; backdrop-filter: none; padding: 0; display: block; }
      .modal { box-shadow: none; border: none; padding: 0; max-width: 100%; border-radius: 0; animation: none; }
      body { background: white; }
    }
  </style>
</head>
<body>

<canvas id="pasta-canvas"></canvas>

<!-- ══ HEADER ══ -->
<header>
  <div class="header-brand">
    <div class="header-site-name">Shelby's Cookbook</div>
    <div class="header-tagline">✦ &nbsp; a collection made with love &nbsp; ✦</div>
    <div class="header-sub" id="recipe-count-header">your personal recipe collection</div>
  </div>
  <div class="header-actions">
    <button class="btn-outline" onclick="openConverter()">⚖️ Convert</button>
    <button class="btn-outline" onclick="importRecipes()">📥 Import</button>
    <button class="btn-outline" onclick="exportRecipes()">✦ Export</button>
    <button class="btn-white" onclick="openAddModal()">+ Add Recipe</button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main>

  <!-- Search + Sort -->
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search recipes, ingredients, tags…" oninput="renderRecipes()">
    </div>
    <select class="sort-select" id="sort-select" onchange="renderRecipes()">
      <option value="newest">Newest first</option>
      <option value="az">A → Z</option>
      <option value="favs">Favorites first</option>
      <option value="cooked">Most cooked</option>
    </select>
  </div>

  <!-- Category pills -->
  <div class="cat-row" id="cat-row">
    <span class="cat-pill fav-pill" id="fav-chip" onclick="toggleFavFilter()">♥ Favorites</span>
    <span class="cat-pill" data-cat="" onclick="setCat(this,'')">All</span>
    <span class="cat-pill" data-cat="Breakfast" onclick="setCat(this,'Breakfast')">🥞 Breakfast</span>
    <span class="cat-pill" data-cat="Lunch" onclick="setCat(this,'Lunch')">🥗 Lunch</span>
    <span class="cat-pill" data-cat="Dinner" onclick="setCat(this,'Dinner')">🍝 Dinner</span>
    <span class="cat-pill" data-cat="Dessert" onclick="setCat(this,'Dessert')">🍰 Dessert</span>
    <span class="cat-pill" data-cat="Snack" onclick="setCat(this,'Snack')">🍿 Snack</span>
    <span class="cat-pill" data-cat="Drink" onclick="setCat(this,'Drink')">🧋 Drink</span>
    <span class="cat-pill" data-cat="Other" onclick="setCat(this,'Other')">✨ Other</span>
  </div>

  <!-- Tag bar -->
  <div class="tag-bar" id="tag-bar" style="display:none"></div>

  <!-- Count -->
  <div class="controls-row">
    <span class="count-label" id="count-label"></span>
  </div>

  <!-- Grid -->
  <div id="recipe-grid" class="recipe-grid"></div>
</main>

<!-- ══ ADD/EDIT MODAL ══ -->
<div class="overlay" id="form-overlay">
  <div class="modal">
    <button class="close" onclick="closeFormModal()">×</button>
    <h2 id="form-title">Add Recipe ✨</h2>

    <div class="form-group">
      <label>Recipe Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Grandma's Chicken Soup">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option value="">Uncategorized</option>
          <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
          <option>Dessert</option><option>Snack</option><option>Drink</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Difficulty</label>
        <select id="f-difficulty">
          <option value="">— Select —</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label>Servings</label>
        <input type="number" id="f-servings" placeholder="4" min="1">
      </div>
      <div class="form-group">
        <label>Prep Time</label>
        <input type="text" id="f-prep" placeholder="15 min">
      </div>
      <div class="form-group">
        <label>Cook Time</label>
        <input type="text" id="f-cook" placeholder="30 min">
      </div>
    </div>
    <div class="form-group">
      <label>Photo URL (optional)</label>
      <input type="url" id="f-photo" placeholder="https://…">
    </div>
    <div class="form-group">
      <label>Tags (comma separated)</label>
      <input type="text" id="f-tags" placeholder="quick, healthy, holiday, family favourite">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-description" placeholder="A short, sweet description…"></textarea>
    </div>
    <div class="form-group">
      <label>Ingredients (one per line)</label>
      <textarea id="f-ingredients" style="min-height:110px" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea>
    </div>
    <div class="form-group">
      <label>Instructions (one step per line)</label>
      <textarea id="f-instructions" style="min-height:130px" placeholder="Preheat oven to 350°F&#10;Mix dry ingredients…"></textarea>
    </div>
    <div class="form-group">
      <label>Notes & Tips</label>
      <textarea id="f-notes" placeholder="Tips, variations, substitutions…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeFormModal()">Cancel</button>
      <button class="btn-pink" onclick="saveRecipe()">Save Recipe 🌸</button>
    </div>
  </div>
</div>

<!-- ══ VIEW MODAL ══ -->
<div class="overlay" id="view-overlay">
  <div class="modal view-modal" id="view-content"></div>
</div>

<!-- ══ UNIT CONVERTER ══ -->
<div class="overlay" id="converter-overlay">
  <div class="modal" style="max-width:460px">
    <button class="close" onclick="closeConverter()">×</button>
    <h2>Unit Converter ⚖️</h2>
    <div class="converter-tabs">
      <button class="conv-tab active" onclick="setConvTab('volume',this)">Volume</button>
      <button class="conv-tab" onclick="setConvTab('weight',this)">Weight</button>
      <button class="conv-tab" onclick="setConvTab('temp',this)">Temp</button>
    </div>
    <div class="converter-grid">
      <div class="form-group" style="margin:0">
        <label>Amount</label>
        <input type="number" id="conv-amount" value="1" step="any" oninput="doConvert()">
      </div>
      <div class="converter-arrow">→</div>
      <div class="form-group" style="margin:0">
        <label>Result</label>
        <div class="converter-result" id="conv-result">—</div>
      </div>
    </div>
    <div style="display:flex;gap:14px">
      <div class="form-group" style="flex:1;margin:0">
        <label>From</label>
        <select id="conv-from" style="width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:14px;font-family:Nunito,sans-serif;font-size:14px" onchange="doConvert()"></select>
      </div>
      <div class="form-group" style="flex:1;margin:0">
        <label>To</label>
        <select id="conv-to" style="width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:14px;font-family:Nunito,sans-serif;font-size:14px" onchange="doConvert()"></select>
      </div>
    </div>
  </div>
</div>

<!-- ══ TIMER ══ -->
<button id="timer-fab" onclick="toggleTimer()">
  ⏱<span class="timer-badge" id="timer-badge"></span>
</button>
<div id="timer-panel">
  <div class="panel-header">
    <span class="panel-header-title">Kitchen Timer</span>
    <button class="panel-close" onclick="toggleTimer()">×</button>
  </div>
  <div class="timer-body">
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="timer-set-labels"><span>Hours</span><span>Minutes</span><span>Seconds</span></div>
    <div class="timer-set">
      <input type="number" id="t-h" value="0" min="0" max="23" oninput="updateTimerFromInputs()">
      <input type="number" id="t-m" value="0" min="0" max="59" oninput="updateTimerFromInputs()">
      <input type="number" id="t-s" value="0" min="0" max="59" oninput="updateTimerFromInputs()">
    </div>
    <div class="timer-presets">
      <button class="preset-btn" onclick="setPreset(5)">5 min</button>
      <button class="preset-btn" onclick="setPreset(10)">10 min</button>
      <button class="preset-btn" onclick="setPreset(15)">15 min</button>
      <button class="preset-btn" onclick="setPreset(30)">30 min</button>
      <button class="preset-btn" onclick="setPreset(60)">1 hr</button>
    </div>
    <div class="timer-controls">
      <button class="btn-ghost" onclick="resetTimer()" style="font-size:12px">↺ Reset</button>
      <button class="btn-pink" id="timer-start-btn" onclick="toggleTimerRun()" style="font-size:13px">▶ Start</button>
    </div>
  </div>
</div>

<!-- ══ GROCERY ══ -->
<button id="grocery-fab" onclick="toggleGrocery()">
  🛒<span class="grocery-badge" id="grocery-badge"></span>
</button>
<div id="grocery-panel">
  <div class="panel-header">
    <span class="panel-header-title">Grocery List</span>
    <button class="panel-close" onclick="toggleGrocery()">×</button>
  </div>
  <div class="grocery-items" id="grocery-items"></div>
  <div class="grocery-input-row">
    <input type="text" id="grocery-input" placeholder="Add an item…" onkeydown="if(event.key==='Enter')addGroceryItem()">
    <button onclick="addGroceryItem()">+</button>
  </div>
  <div class="grocery-footer">
    <button class="btn-ghost" onclick="clearCheckedGrocery()">✓ Clear done</button>
    <button class="btn-ghost" onclick="clearAllGrocery()">✕ Clear all</button>
  </div>
</div>

<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

<!-- ══ SCRIPT ══ -->
<script>
// ── State ──────────────────────────────
let recipes = JSON.parse(localStorage.getItem('cookbook_recipes') || '[]');
let editingId = null;
let filterFavs = false;
let filterTag = '';
let activeCat = '';
let currentViewId = null;
let scaledServings = null;

const catEmoji = { Breakfast:'🥞', Lunch:'🥗', Dinner:'🍝', Dessert:'🍰', Snack:'🍿', Drink:'🧋', Other:'✨', '':'🌸' };
const catClass = { Breakfast:'ph-breakfast', Lunch:'ph-lunch', Dinner:'ph-dinner', Dessert:'ph-dessert', Snack:'ph-snack', Drink:'ph-drink', Other:'ph-other', '':'ph-default' };

function save() { localStorage.setItem('cookbook_recipes', JSON.stringify(recipes)); renderRecipes(); }

// ── Category pill filter ────────────────
function setCat(el, cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-pill[data-cat]').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderRecipes();
}

function toggleFavFilter() {
  filterFavs = !filterFavs;
  document.getElementById('fav-chip').classList.toggle('active', filterFavs);
  renderRecipes();
}

// ── Render ──────────────────────────────
function renderRecipes() {
  const search = document.getElementById('search').value.toLowerCase();
  const sort   = document.getElementById('sort-select').value;

  let list = recipes.filter(r => {
    const text = (r.name + ' ' + (r.description||'') + ' ' + (r.ingredients||'') + ' ' + (r.tags||[]).join(' ')).toLowerCase();
    return text.includes(search)
      && (!activeCat || r.category === activeCat)
      && (!filterFavs || r.favorite)
      && (!filterTag  || (r.tags||[]).map(t=>t.toLowerCase()).includes(filterTag.toLowerCase()));
  });

  if (sort==='az')     list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort==='favs')   list.sort((a,b) => (b.favorite?1:0)-(a.favorite?1:0));
  else if (sort==='cooked') list.sort((a,b) => (b.cookLog||[]).length-(a.cookLog||[]).length);
  else list.sort((a,b) => b.createdAt-a.createdAt);

  document.getElementById('recipe-count-header').textContent =
    recipes.length === 0 ? 'your personal recipe collection'
    : `${recipes.length} recipe${recipes.length!==1?'s':''} saved with love ✦`;

  document.getElementById('count-label').textContent =
    recipes.length === 0 ? '' : `showing ${list.length} of ${recipes.length}`;

  buildTagBar();

  const grid = document.getElementById('recipe-grid');
  if (!recipes.length) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🍰</span><h2>No recipes yet</h2><p>Click "+ Add Recipe" to begin your cookbook.</p></div>`;
    return;
  }
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><h2>Nothing found</h2><p>Try a different search or filter.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(r => {
    const diffClass = r.difficulty ? 'diff-'+r.difficulty.toLowerCase() : '';
    const tags = (r.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('');
    const lastCooked = r.cookLog?.length
      ? `<div class="cook-log-info">🍳 Made ${r.cookLog.length}× &middot; ${timeAgo(r.cookLog.at(-1))}</div>` : '';
    const phClass = catClass[r.category] || 'ph-default';
    const phEmoji = catEmoji[r.category] || '🌸';
    const imgHtml = r.photo
      ? `<img class="card-photo" src="${r.photo}" alt="${r.name}" onerror="this.parentElement.innerHTML='<div class=\\"card-placeholder ${phClass}\\"><span>${phEmoji}</span></div>'">`
      : `<div class="card-placeholder ${phClass}"><span>${phEmoji}</span></div>`;
    return `
      <div class="recipe-card ${r.favorite?'is-fav':''}">
        ${imgHtml}
        <div class="card-body">
          <div class="card-top">
            <div class="card-badges">
              ${r.category?`<span class="badge-cat">${r.category}</span>`:''}
              ${r.difficulty?`<span class="badge-diff ${diffClass}">${r.difficulty}</span>`:''}
            </div>
            <button class="fav-btn ${r.favorite?'active':''}" onclick="event.stopPropagation();toggleFavorite('${r.id}')">${r.favorite?'♥':'♡'}</button>
          </div>
          <h3 onclick="viewRecipe('${r.id}')">${r.name}</h3>
          ${r.description?`<div class="card-description">${r.description}</div>`:''}
          <div class="card-meta">
            ${r.servings?`<span>🍽 ${r.servings}</span>`:''}
            ${r.prep?`<span>⏱ ${r.prep}</span>`:''}
            ${r.cook?`<span>🔥 ${r.cook}</span>`:''}
          </div>
          ${tags?`<div class="card-tags">${tags}</div>`:''}
          ${lastCooked}
        </div>
      </div>`;
  }).join('');
}

function buildTagBar() {
  const allTags = [...new Set(recipes.flatMap(r=>r.tags||[]).filter(Boolean))];
  const bar = document.getElementById('tag-bar');
  bar.innerHTML = '';
  if (!allTags.length) { bar.style.display='none'; return; }
  bar.style.display = 'flex';
  allTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip'+(filterTag===tag?' active':'');
    chip.textContent = '# '+tag;
    chip.onclick = () => { filterTag = filterTag===tag?'':tag; renderRecipes(); };
    bar.appendChild(chip);
  });
}

function toggleFavorite(id) {
  const r = recipes.find(r=>r.id===id);
  if (r) { r.favorite=!r.favorite; save(); }
}

function timeAgo(ts) {
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return 'today';
  if (d===1) return 'yesterday';
  if (d<30)  return `${d}d ago`;
  if (d<365) return `${Math.floor(d/30)}mo ago`;
  return `${Math.floor(d/365)}yr ago`;
}

// ── Add / Edit ──────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('form-title').textContent = 'Add Recipe ✨';
  ['name','servings','prep','cook','photo','tags','description','ingredients','instructions','notes'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-category').value='';
  document.getElementById('f-difficulty').value='';
  document.getElementById('form-overlay').classList.add('open');
}
function closeFormModal() { document.getElementById('form-overlay').classList.remove('open'); }

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Please enter a recipe name.'); return; }
  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const recipe = {
    id: editingId||Date.now().toString(),
    name,
    category:    document.getElementById('f-category').value,
    difficulty:  document.getElementById('f-difficulty').value,
    servings:    parseFloat(document.getElementById('f-servings').value)||'',
    prep:        document.getElementById('f-prep').value.trim(),
    cook:        document.getElementById('f-cook').value.trim(),
    photo:       document.getElementById('f-photo').value.trim(),
    tags,
    description: document.getElementById('f-description').value.trim(),
    ingredients: document.getElementById('f-ingredients').value.trim(),
    instructions:document.getElementById('f-instructions').value.trim(),
    notes:       document.getElementById('f-notes').value.trim(),
    favorite:    editingId?(recipes.find(r=>r.id===editingId)?.favorite||false):false,
    cookLog:     editingId?(recipes.find(r=>r.id===editingId)?.cookLog||[]):[],
    createdAt:   editingId?(recipes.find(r=>r.id===editingId)?.createdAt||Date.now()):Date.now(),
  };
  if (editingId) recipes=recipes.map(r=>r.id===editingId?recipe:r);
  else recipes.unshift(recipe);
  save(); closeFormModal();
}

// ── View ────────────────────────────────
function viewRecipe(id) {
  const r = recipes.find(r=>r.id===id);
  if (!r) return;
  currentViewId=id; scaledServings=r.servings||null;
  renderViewModal(r);
  document.getElementById('view-overlay').classList.add('open');
}

function renderViewModal(r) {
  const orig = r.servings;
  const scale = (orig&&scaledServings) ? scaledServings/orig : 1;
  const ingredients = r.ingredients
    ? r.ingredients.split('\n').filter(Boolean).map(l=>`<li>${scaleText(l,scale)}</li>`).join('') : '';
  const instructions = r.instructions
    ? r.instructions.split('\n').filter(Boolean).map(s=>`<li>${s}</li>`).join('') : '';
  const tags = (r.tags||[]).map(t=>`<span class="card-tag" style="font-size:12px;padding:4px 11px">${t}</span>`).join('');
  const diffClass = r.difficulty?'diff-'+r.difficulty.toLowerCase():'';
  const logs = (r.cookLog||[]).slice().reverse().slice(0,8)
    .map(ts=>`<span class="log-entry">${new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>`).join('');

  document.getElementById('view-content').innerHTML = `
    <button class="close" onclick="closeViewModal()">×</button>
    ${r.photo?`<img class="vm-photo" src="${r.photo}" alt="${r.name}" onerror="this.style.display='none'">` : ''}
    <div class="vm-header">
      <h2>${r.name}</h2>
      <button class="vm-fav ${r.favorite?'active':''}" onclick="toggleFavorite('${r.id}');this.classList.toggle('active');this.textContent=this.classList.contains('active')?'♥':'♡'">${r.favorite?'♥':'♡'}</button>
    </div>
    <div class="vm-badges">
      ${r.category?`<span class="badge-cat">${r.category}</span>`:''}
      ${r.difficulty?`<span class="badge-diff ${diffClass}">${r.difficulty}</span>`:''}
    </div>
    ${tags?`<div class="vm-tags">${tags}</div>`:''}
    <div class="vm-meta">
      ${r.prep?`<span>⏱ Prep ${r.prep}</span>`:''}
      ${r.cook?`<span>🔥 Cook ${r.cook}</span>`:''}
      ${(r.cookLog||[]).length?`<span>🍳 Made ${r.cookLog.length}×</span>`:''}
    </div>
    ${r.description?`<div class="vm-description">${r.description}</div>`:''}
    ${orig?`<div class="scaler">
      <label>🍽 Servings</label>
      <div class="scaler-controls">
        <button class="scaler-btn" onclick="adjustScale(-1)">−</button>
        <span class="scaler-val" id="scaler-val">${scaledServings||orig}</span>
        <button class="scaler-btn" onclick="adjustScale(1)">+</button>
      </div>
    </div>`:''}
    ${ingredients?`<div class="ingredients"><h3>✦ Ingredients</h3><ul>${ingredients}</ul></div>`:''}
    ${instructions?`<div class="instructions"><h3>✦ Instructions</h3><ol>${instructions}</ol></div>`:''}
    ${r.notes?`<h3>✦ Notes & Tips</h3><div class="notes">${r.notes}</div>`:''}
    <div class="cook-log-section">
      <h3>✦ Cook Log</h3>
      <button class="btn-pink" style="font-size:12px;padding:7px 16px;margin-bottom:8px" onclick="logCook('${r.id}')">🍳 I made this!</button>
      <div class="log-entries">${logs||'<span style="font-size:12px;color:var(--muted)">No cook logs yet</span>'}</div>
    </div>
    <div class="view-actions">
      <button class="btn-ghost" style="font-size:12px" onclick="addAllToGrocery('${r.id}')">🛒 Grocery list</button>
      <button class="btn-ghost" style="font-size:12px" onclick="printRecipe()">🖨 Print</button>
      <button class="btn-danger" style="font-size:12px" onclick="deleteRecipe('${r.id}')">Delete</button>
      <button class="btn-ghost" style="font-size:12px" onclick="editRecipe('${r.id}')">✏️ Edit</button>
    </div>`;
}

function adjustScale(d) {
  const r=recipes.find(r=>r.id===currentViewId);
  if(!r||!r.servings) return;
  scaledServings=Math.max(1,(scaledServings||r.servings)+d);
  renderViewModal(r);
}
function scaleText(line,scale) {
  if(scale===1||!scale) return line;
  return line.replace(/(\d+(\.\d+)?)/g,(_,n)=>{
    const v=parseFloat(n)*scale;
    return v%1===0?v:parseFloat(v.toFixed(2));
  });
}
function closeViewModal() { document.getElementById('view-overlay').classList.remove('open'); currentViewId=null; }

function editRecipe(id) {
  const r=recipes.find(r=>r.id===id);
  if(!r) return;
  closeViewModal(); editingId=id;
  document.getElementById('form-title').textContent='Edit Recipe ✨';
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-category').value=r.category||'';
  document.getElementById('f-difficulty').value=r.difficulty||'';
  document.getElementById('f-servings').value=r.servings||'';
  document.getElementById('f-prep').value=r.prep||'';
  document.getElementById('f-cook').value=r.cook||'';
  document.getElementById('f-photo').value=r.photo||'';
  document.getElementById('f-tags').value=(r.tags||[]).join(', ');
  document.getElementById('f-description').value=r.description||'';
  document.getElementById('f-ingredients').value=r.ingredients||'';
  document.getElementById('f-instructions').value=r.instructions||'';
  document.getElementById('f-notes').value=r.notes||'';
  document.getElementById('form-overlay').classList.add('open');
}

function deleteRecipe(id) {
  if(!confirm('Delete this recipe?')) return;
  recipes=recipes.filter(r=>r.id!==id);
  save(); closeViewModal();
}
function logCook(id) {
  const r=recipes.find(r=>r.id===id); if(!r) return;
  if(!r.cookLog) r.cookLog=[];
  r.cookLog.push(Date.now()); save(); renderViewModal(r);
}
function printRecipe() { window.print(); }

// ── Import / Export ─────────────────────
function exportRecipes() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'}));
  a.download='shelbys-cookbook.json'; a.click();
}
function importRecipes() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const imp=JSON.parse(ev.target.result);
      if(!Array.isArray(imp)) throw 0;
      const newOnes=imp.filter(r=>!recipes.find(x=>x.id===r.id));
      recipes=[...newOnes,...recipes]; save();
      alert(`✅ Imported ${newOnes.length} new recipe${newOnes.length!==1?'s':''}!`);
    } catch { alert('⚠️ Invalid file.'); }
  };
  reader.readAsText(file); e.target.value='';
}

// ── Unit Converter ──────────────────────
const convData = {
  volume: { units:['tsp','tbsp','fl oz','cup','pint','quart','gallon','ml','L'], toMl:{tsp:4.92892,tbsp:14.7868,'fl oz':29.5735,cup:236.588,pint:473.176,quart:946.353,gallon:3785.41,ml:1,L:1000} },
  weight: { units:['oz','lb','g','kg'], toG:{oz:28.3495,lb:453.592,g:1,kg:1000} },
  temp:   { units:['°F','°C','K'] }
};
let convTab='volume';
function setConvTab(tab,el) { convTab=tab; document.querySelectorAll('.conv-tab').forEach(b=>b.classList.remove('active')); el.classList.add('active'); populateConvSelects(); doConvert(); }
function populateConvSelects() {
  const units=convData[convTab].units;
  ['conv-from','conv-to'].forEach((id,i)=>{ document.getElementById(id).innerHTML=units.map((u,j)=>`<option${j===i?' selected':''}>${u}</option>`).join(''); });
  if(convTab==='volume') document.getElementById('conv-to').value='ml';
  if(convTab==='temp') { document.getElementById('conv-from').value='°F'; document.getElementById('conv-to').value='°C'; }
}
function doConvert() {
  const amt=parseFloat(document.getElementById('conv-amount').value)||0;
  const from=document.getElementById('conv-from').value;
  const to=document.getElementById('conv-to').value;
  let r;
  if(convTab==='volume') r=amt*convData.volume.toMl[from]/convData.volume.toMl[to];
  else if(convTab==='weight') r=amt*convData.weight.toG[from]/convData.weight.toG[to];
  else {
    if(from==='°F'&&to==='°C') r=(amt-32)*5/9;
    else if(from==='°C'&&to==='°F') r=amt*9/5+32;
    else if(from==='°F'&&to==='K') r=(amt-32)*5/9+273.15;
    else if(from==='K'&&to==='°F') r=(amt-273.15)*9/5+32;
    else if(from==='°C'&&to==='K') r=amt+273.15;
    else if(from==='K'&&to==='°C') r=amt-273.15;
    else r=amt;
  }
  document.getElementById('conv-result').textContent=isNaN(r)?'—':`${parseFloat(r.toFixed(4))} ${to}`;
}
function openConverter() { populateConvSelects(); doConvert(); document.getElementById('converter-overlay').classList.add('open'); }
function closeConverter() { document.getElementById('converter-overlay').classList.remove('open'); }

// ── Timer ───────────────────────────────
let timerRunning=false, timerInterval=null, timerSeconds=0, timerOpen=false;
function toggleTimer() { timerOpen=!timerOpen; document.getElementById('timer-panel').classList.toggle('open',timerOpen); }
function updateTimerFromInputs() {
  if(timerRunning) return;
  timerSeconds=(parseInt(document.getElementById('t-h').value)||0)*3600+(parseInt(document.getElementById('t-m').value)||0)*60+(parseInt(document.getElementById('t-s').value)||0);
  displayTimer();
}
function setPreset(min) {
  if(timerRunning) return;
  timerSeconds=min*60;
  document.getElementById('t-h').value=min>=60?Math.floor(min/60):0;
  document.getElementById('t-m').value=min>=60?0:min;
  document.getElementById('t-s').value=0;
  displayTimer();
}
function toggleTimerRun() {
  if(timerSeconds<=0&&!timerRunning) return;
  timerRunning=!timerRunning;
  document.getElementById('timer-start-btn').textContent=timerRunning?'⏸ Pause':'▶ Start';
  document.getElementById('timer-display').classList.remove('done');
  if(timerRunning) {
    timerInterval=setInterval(()=>{
      timerSeconds--;
      if(timerSeconds<=0) {
        timerSeconds=0; clearInterval(timerInterval); timerRunning=false;
        document.getElementById('timer-start-btn').textContent='▶ Start';
        document.getElementById('timer-display').classList.add('done');
        beep();
        const b=document.getElementById('timer-badge'); b.textContent='!'; b.style.display='flex';
      }
      displayTimer(); updateTimerBadge();
    },1000);
  } else clearInterval(timerInterval);
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning=false; timerSeconds=0;
  ['t-h','t-m','t-s'].forEach(id=>document.getElementById(id).value=0);
  document.getElementById('timer-start-btn').textContent='▶ Start';
  document.getElementById('timer-display').classList.remove('done');
  document.getElementById('timer-badge').style.display='none';
  displayTimer();
}
function displayTimer() {
  const h=Math.floor(timerSeconds/3600),m=Math.floor((timerSeconds%3600)/60),s=timerSeconds%60;
  document.getElementById('timer-display').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function updateTimerBadge() {
  const b=document.getElementById('timer-badge');
  if(timerRunning&&!timerOpen) { const m=Math.floor(timerSeconds/60),s=timerSeconds%60; b.textContent=m>0?`${m}m`:`${s}s`; b.style.display='flex'; }
  else if(!timerRunning) b.style.display='none';
}
function beep() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.3,.6].forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.4,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.25);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.3);});
  } catch(e){}
}

// ── Grocery ─────────────────────────────
let grocery=JSON.parse(localStorage.getItem('cookbook_grocery')||'[]'), groceryOpen=false;
function saveGrocery() { localStorage.setItem('cookbook_grocery',JSON.stringify(grocery)); renderGrocery(); }
function toggleGrocery() { groceryOpen=!groceryOpen; document.getElementById('grocery-panel').classList.toggle('open',groceryOpen); if(groceryOpen) setTimeout(()=>document.getElementById('grocery-input').focus(),180); }
function renderGrocery() {
  const el=document.getElementById('grocery-items'), b=document.getElementById('grocery-badge');
  const unc=grocery.filter(g=>!g.done).length;
  b.textContent=unc||''; b.style.display=unc?'flex':'none';
  if(!grocery.length) { el.innerHTML=`<div class="grocery-empty"><div class="gi">🛍️</div>Your list is empty!</div>`; return; }
  el.innerHTML=grocery.map((item,i)=>`
    <div class="grocery-item ${item.done?'done':''}">
      <input type="checkbox" ${item.done?'checked':''} onchange="toggleGroceryItem(${i})">
      <span class="grocery-item-text" onclick="toggleGroceryItem(${i})">${item.text}</span>
      <button class="grocery-item-del" onclick="removeGroceryItem(${i})">×</button>
    </div>`).join('');
}
function addGroceryItem(text) {
  const input=document.getElementById('grocery-input'), val=(text||input.value).trim();
  if(!val) return; grocery.push({text:val,done:false}); input.value=''; saveGrocery();
}
function toggleGroceryItem(i) { grocery[i].done=!grocery[i].done; saveGrocery(); }
function removeGroceryItem(i) { grocery.splice(i,1); saveGrocery(); }
function clearCheckedGrocery() { grocery=grocery.filter(g=>!g.done); saveGrocery(); }
function clearAllGrocery() { if(!grocery.length||confirm('Clear entire grocery list?')) { grocery=[]; saveGrocery(); } }
function addAllToGrocery(id) {
  const r=recipes.find(r=>r.id===id); if(!r||!r.ingredients) return;
  r.ingredients.split('\n').filter(Boolean).forEach(l=>grocery.push({text:l.trim(),done:false}));
  saveGrocery(); closeViewModal(); groceryOpen=true; document.getElementById('grocery-panel').classList.add('open');
}

// ── Backdrop close ──────────────────────
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o){o.classList.remove('open');currentViewId=null;} }));

// ── Init ────────────────────────────────
renderGrocery();
renderRecipes();
document.querySelector('.cat-pill[data-cat=""]').classList.add('active');

// ── Floating Pasta Shells ───────────────
(function() {
  const canvas = document.getElementById('pasta-canvas');
  const ctx = canvas.getContext('2d');

  const SHELLS = ['🐚','🐚','🐚','🐚','🐚','🌸','🐚','🐚'];
  const COUNT  = 28;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(min, max) { return min + Math.random() * (max - min); }

  function makeShell(atBottom) {
    return {
      emoji:      SHELLS[Math.floor(Math.random() * SHELLS.length)],
      x:          rand(0, window.innerWidth),
      y:          atBottom ? rand(window.innerHeight, window.innerHeight + 200) : rand(-200, window.innerHeight),
      size:       rand(14, 30),
      speedY:     rand(0.25, 0.65),
      swayAmp:    rand(18, 55),
      swayFreq:   rand(0.0008, 0.002),
      swayPhase:  rand(0, Math.PI * 2),
      rot:        rand(0, Math.PI * 2),
      rotSpeed:   rand(-0.012, 0.012),
      opacity:    rand(0.10, 0.22),
    };
  }

  const shells = Array.from({ length: COUNT }, () => makeShell(false));

  function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    shells.forEach(s => {
      // move up
      s.y       -= s.speedY;
      s.rot     += s.rotSpeed;
      // horizontal sway
      const sway = Math.sin(timestamp * s.swayFreq + s.swayPhase) * s.swayAmp;

      // recycle when off top
      if (s.y < -60) {
        const fresh = makeShell(true);
        Object.assign(s, fresh);
      }

      ctx.save();
      ctx.globalAlpha = s.opacity;
      ctx.translate(s.x + sway, s.y);
      ctx.rotate(s.rot);
      ctx.font = `${s.size}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.emoji, 0, 0);
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
