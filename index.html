<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cookbook</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf8f0;
      color: #2c1810;
      min-height: 100vh;
    }

    header {
      background: #2c1810;
      color: #fdf8f0;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 28px; letter-spacing: 1px; }
    header p { font-size: 13px; opacity: 0.6; margin-top: 4px; }

    .header-actions { display: flex; gap: 12px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 18px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    .btn-primary { background: #c0392b; color: white; }
    .btn-secondary { background: transparent; color: #fdf8f0; border: 1px solid rgba(255,255,255,0.4); }
    .btn-ghost { background: transparent; color: #2c1810; border: 1px solid #ddd; }
    .btn-danger { background: #e74c3c; color: white; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      background: white;
    }

    .search-bar input:focus { outline: none; border-color: #c0392b; }

    .filter-select {
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      background: white;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }

    .empty-state h2 { font-size: 22px; margin-bottom: 8px; }
    .empty-state p { font-size: 15px; }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .recipe-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      border: 1px solid #eee;
    }

    .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }

    .recipe-card .category {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #c0392b;
      font-family: sans-serif;
      margin-bottom: 8px;
    }

    .recipe-card h3 { font-size: 18px; margin-bottom: 8px; }

    .recipe-card .meta {
      font-size: 13px;
      color: #888;
      font-family: sans-serif;
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .recipe-card .description {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .overlay.open { display: flex; justify-content: center; align-items: flex-start; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 36px;
      width: 100%;
      max-width: 640px;
      position: relative;
    }

    .modal h2 { font-size: 22px; margin-bottom: 24px; }

    .modal .close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
      padding: 4px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      background: white;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { outline: none; border-color: #c0392b; }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* View modal */
    .view-modal h2 { font-size: 26px; margin-bottom: 6px; }
    .view-modal .view-category { color: #c0392b; font-family: sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .view-modal .view-meta { display: flex; gap: 24px; font-family: sans-serif; font-size: 14px; color: #888; margin-bottom: 24px; }
    .view-modal .view-description { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 24px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
    .view-modal h3 { font-size: 16px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 12px; }
    .view-modal .ingredients { margin-bottom: 24px; }
    .view-modal .ingredients ul { list-style: none; }
    .view-modal .ingredients li { padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 15px; }
    .view-modal .ingredients li::before { content: "·  "; color: #c0392b; }
    .view-modal .instructions { margin-bottom: 24px; }
    .view-modal .instructions ol { padding-left: 20px; }
    .view-modal .instructions li { padding: 6px 0; font-size: 15px; line-height: 1.6; }
    .view-modal .notes { background: #fdf8f0; border-radius: 8px; padding: 16px; font-size: 15px; line-height: 1.6; color: #666; }
    .view-modal .view-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    .count { font-family: sans-serif; font-size: 14px; color: #888; margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>My Cookbook</h1>
    <p id="recipe-count-header"></p>
  </div>
  <div class="header-actions">
    <button class="btn-secondary" onclick="exportRecipes()">Export JSON</button>
    <button class="btn-primary" onclick="openAddModal()">+ Add Recipe</button>
  </div>
</header>

<main>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search recipes..." oninput="renderRecipes()">
    <select class="filter-select" id="category-filter" onchange="renderRecipes()">
      <option value="">All Categories</option>
      <option>Breakfast</option>
      <option>Lunch</option>
      <option>Dinner</option>
      <option>Dessert</option>
      <option>Snack</option>
      <option>Drink</option>
      <option>Other</option>
    </select>
  </div>

  <div id="recipe-grid" class="recipe-grid"></div>
</main>

<!-- Add/Edit Modal -->
<div class="overlay" id="form-overlay">
  <div class="modal">
    <button class="close" onclick="closeFormModal()">×</button>
    <h2 id="form-title">Add Recipe</h2>

    <div class="form-group">
      <label>Recipe Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Grandma's Chicken Soup">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option value="">Uncategorized</option>
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Dessert</option>
          <option>Snack</option>
          <option>Drink</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Servings</label>
        <input type="text" id="f-servings" placeholder="e.g. 4">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Prep Time</label>
        <input type="text" id="f-prep" placeholder="e.g. 15 min">
      </div>
      <div class="form-group">
        <label>Cook Time</label>
        <input type="text" id="f-cook" placeholder="e.g. 30 min">
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="f-description" placeholder="A short description of the dish..."></textarea>
    </div>

    <div class="form-group">
      <label>Ingredients (one per line)</label>
      <textarea id="f-ingredients" style="min-height:120px" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea>
    </div>

    <div class="form-group">
      <label>Instructions (one step per line)</label>
      <textarea id="f-instructions" style="min-height:140px" placeholder="Preheat oven to 350°F&#10;Mix dry ingredients&#10;..."></textarea>
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Tips, variations, substitutions..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-ghost" onclick="closeFormModal()">Cancel</button>
      <button class="btn-primary" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="overlay" id="view-overlay">
  <div class="modal view-modal" id="view-content"></div>
</div>

<script>
  let recipes = JSON.parse(localStorage.getItem('cookbook_recipes') || '[]');
  let editingId = null;

  function save() {
    localStorage.setItem('cookbook_recipes', JSON.stringify(recipes));
    renderRecipes();
  }

  function renderRecipes() {
    const search = document.getElementById('search').value.toLowerCase();
    const cat = document.getElementById('category-filter').value;

    let filtered = recipes.filter(r => {
      const matchSearch = r.name.toLowerCase().includes(search) ||
        (r.description || '').toLowerCase().includes(search) ||
        (r.ingredients || '').toLowerCase().includes(search);
      const matchCat = !cat || r.category === cat;
      return matchSearch && matchCat;
    });

    document.getElementById('recipe-count-header').textContent =
      `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}`;

    const grid = document.getElementById('recipe-grid');

    if (recipes.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <h2>No recipes yet</h2>
        <p>Click "+ Add Recipe" to start building your cookbook.</p>
      </div>`;
      return;
    }

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <h2>No matches</h2>
        <p>Try a different search or category.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(r => `
      <div class="recipe-card" onclick="viewRecipe('${r.id}')">
        <div class="category">${r.category || 'Uncategorized'}</div>
        <h3>${r.name}</h3>
        ${r.description ? `<div class="description">${r.description}</div>` : ''}
        <div class="meta">
          ${r.servings ? `<span>Serves ${r.servings}</span>` : ''}
          ${r.prep ? `<span>Prep ${r.prep}</span>` : ''}
          ${r.cook ? `<span>Cook ${r.cook}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('form-title').textContent = 'Add Recipe';
    ['name','category','servings','prep','cook','description','ingredients','instructions','notes']
      .forEach(f => { const el = document.getElementById('f-'+f); el.value = ''; });
    document.getElementById('form-overlay').classList.add('open');
  }

  function closeFormModal() {
    document.getElementById('form-overlay').classList.remove('open');
  }

  function saveRecipe() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Please enter a recipe name.'); return; }

    const recipe = {
      id: editingId || Date.now().toString(),
      name,
      category: document.getElementById('f-category').value,
      servings: document.getElementById('f-servings').value.trim(),
      prep: document.getElementById('f-prep').value.trim(),
      cook: document.getElementById('f-cook').value.trim(),
      description: document.getElementById('f-description').value.trim(),
      ingredients: document.getElementById('f-ingredients').value.trim(),
      instructions: document.getElementById('f-instructions').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      createdAt: editingId ? (recipes.find(r => r.id === editingId)?.createdAt || Date.now()) : Date.now(),
    };

    if (editingId) {
      recipes = recipes.map(r => r.id === editingId ? recipe : r);
    } else {
      recipes.unshift(recipe);
    }

    save();
    closeFormModal();
  }

  function viewRecipe(id) {
    const r = recipes.find(r => r.id === id);
    if (!r) return;

    const ingredients = r.ingredients
      ? r.ingredients.split('\n').filter(Boolean).map(i => `<li>${i}</li>`).join('')
      : '';
    const instructions = r.instructions
      ? r.instructions.split('\n').filter(Boolean).map(s => `<li>${s}</li>`).join('')
      : '';

    document.getElementById('view-content').innerHTML = `
      <button class="close" onclick="closeViewModal()">×</button>
      <div class="view-category">${r.category || 'Uncategorized'}</div>
      <h2>${r.name}</h2>
      <div class="view-meta">
        ${r.servings ? `<span>Serves ${r.servings}</span>` : ''}
        ${r.prep ? `<span>Prep ${r.prep}</span>` : ''}
        ${r.cook ? `<span>Cook ${r.cook}</span>` : ''}
      </div>
      ${r.description ? `<div class="view-description">${r.description}</div>` : ''}
      ${ingredients ? `<div class="ingredients"><h3>Ingredients</h3><ul>${ingredients}</ul></div>` : ''}
      ${instructions ? `<div class="instructions"><h3>Instructions</h3><ol>${instructions}</ol></div>` : ''}
      ${r.notes ? `<h3>Notes</h3><div class="notes">${r.notes}</div>` : ''}
      <div class="view-actions">
        <button class="btn-danger" onclick="deleteRecipe('${r.id}')">Delete</button>
        <button class="btn-ghost" onclick="editRecipe('${r.id}')">Edit</button>
      </div>
    `;

    document.getElementById('view-overlay').classList.add('open');
  }

  function closeViewModal() {
    document.getElementById('view-overlay').classList.remove('open');
  }

  function editRecipe(id) {
    const r = recipes.find(r => r.id === id);
    if (!r) return;
    closeViewModal();
    editingId = id;
    document.getElementById('form-title').textContent = 'Edit Recipe';
    document.getElementById('f-name').value = r.name;
    document.getElementById('f-category').value = r.category || '';
    document.getElementById('f-servings').value = r.servings || '';
    document.getElementById('f-prep').value = r.prep || '';
    document.getElementById('f-cook').value = r.cook || '';
    document.getElementById('f-description').value = r.description || '';
    document.getElementById('f-ingredients').value = r.ingredients || '';
    document.getElementById('f-instructions').value = r.instructions || '';
    document.getElementById('f-notes').value = r.notes || '';
    document.getElementById('form-overlay').classList.add('open');
  }

  function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    recipes = recipes.filter(r => r.id !== id);
    save();
    closeViewModal();
  }

  function exportRecipes() {
    const blob = new Blob([JSON.stringify(recipes, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'my-cookbook.json';
    a.click();
  }

  renderRecipes();
</script>
</body>
</html>
